<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Reducing Plastic Waste for Better Ocean</title>
  <meta name="description" content="Sign in to report waste dumping and help authorities clean your community.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card glass-container">
      <div class="auth-header">
        <div class="logo" style="justify-content: center; margin-bottom: 1rem; font-size: 1.4rem; text-align: center; line-height: 1.4; display: flex;">
          <i class="fa-solid fa-trash-can" style="color: var(--primary-color);"></i>
          <span>Reducing Plastic Waste</span> &nbsp;for Better Ocean
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to your account to report and track waste cleaning</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="input-control" placeholder="Enter your username" required minlength="3">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-control" placeholder="Enter your password" required minlength="6">
        </div>

        <button type="submit" class="btn-primary" id="btn-login-submit">
          <i class="fa-solid fa-right-to-bracket" style="margin-right: 0.5rem;"></i> Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('btn-login-submit');

      // Disable button & show spinner
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing In...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            password: passwordInput.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        // Save token and user details
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showToast('Login successful! Redirecting...', 'success');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);

      } catch (err) {
        showToast(err.message, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket" style="margin-right: 0.5rem;"></i> Sign In';
      }
    });

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.className = `toast show ${type}`;
      toast.textContent = message;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
  </script>
</body>
</html>
