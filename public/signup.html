<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Reducing Plastic Waste for Better Ocean</title>
  <meta name="description" content="Register an account to report waste dumping locations and help cleanup.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card glass-container">
      <div class="auth-header">
        <div class="logo" style="justify-content: center; margin-bottom: 1rem; font-size: 1.4rem; text-align: center; line-height: 1.4; display: flex;">
          <i class="fa-solid fa-trash-can" style="color: var(--primary-color);"></i>
          <span>Reducing Plastic Waste</span> &nbsp;for Better Ocean
        </div>
        <h1>Create Account</h1>
        <p>Register as a citizen reporter or municipality official</p>
      </div>

      <form id="signup-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="input-control" placeholder="Enter username (min 3 chars)" required minlength="3">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-control" placeholder="Enter password (min 6 chars)" required minlength="6">
        </div>

        <div class="form-group">
          <label>Account Type</label>
          <div class="role-selection">
            <input type="radio" name="role" id="role-user" value="user" class="role-radio" checked>
            <label for="role-user" class="role-label">
              <i class="fa-solid fa-user" style="margin-right: 0.3rem;"></i> User
            </label>

            <input type="radio" name="role" id="role-admin" value="admin" class="role-radio">
            <label for="role-admin" class="role-label">
              <i class="fa-solid fa-user-shield" style="margin-right: 0.3rem;"></i> Admin
            </label>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="btn-signup-submit" style="margin-top: 1rem;">
          <i class="fa-solid fa-user-plus" style="margin-right: 0.5rem;"></i> Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign In</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const roleInput = document.querySelector('input[name="role"]:checked');
      const submitBtn = document.getElementById('btn-signup-submit');

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Registering...';

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            password: passwordInput.value,
            role: roleInput.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Registration failed');
        }

        // Save token and user details
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showToast('Registration successful! Redirecting...', 'success');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);

      } catch (err) {
        showToast(err.message, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-user-plus" style="margin-right: 0.5rem;"></i> Create Account';
      }
    });

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.className = `toast show ${type}`;
      toast.textContent = message;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
  </script>
</body>
</html>
